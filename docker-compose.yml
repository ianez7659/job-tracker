services:
  db:
    image: postgres:16-alpine
    container_name: jobflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobflow
    ports:
      - "5432:5432"
    volumes:
      - jobflow_pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: jobflow-app
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  jobflow_pgdata:
